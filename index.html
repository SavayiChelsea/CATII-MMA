<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Save Our Wildlife</h1>
        
        <div id="videoContainer" class="video-wrapper">
            <video id="wildlifeVideo" controls width="100%" aria-label="Promotional video about wildlife conservation">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <p class="description">
            Join our efforts to protect and preserve endangered species around the globe. Every action counts in the fight to save our wildlife.
        </p>

        <button id="toggleBtn" class="action-btn" aria-controls="wildlifeVideo">Play Video</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
